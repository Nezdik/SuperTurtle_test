<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SuperTurtle Motion</title>
    <style>
      :root {
        --bg-1: #fdf6e3;
        --bg-2: #d4f5e3;
        --ink: #12363a;
        --accent: #ff6b35;
        --trail: #1e7f5b;
        --shell: #2e7d32;
        --shell-dark: #1f5b2a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Georgia, "Times New Roman", serif;
        color: var(--ink);
        background: radial-gradient(circle at 20% 20%, #ffffff 0%, var(--bg-1) 45%, var(--bg-2) 100%);
        overflow: hidden;
      }

      .scene {
        position: relative;
        width: 100vw;
        height: 100vh;
      }

      canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }

      .title {
        position: absolute;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        font-size: clamp(18px, 2.2vw, 30px);
        letter-spacing: 0.02em;
        text-align: center;
        text-transform: uppercase;
      }

      .turtle {
        position: absolute;
        width: 76px;
        height: 46px;
        transform-origin: center;
        pointer-events: none;
        filter: drop-shadow(0 6px 8px rgba(0, 0, 0, 0.2));
      }

      .shell {
        position: absolute;
        left: 12px;
        top: 4px;
        width: 46px;
        height: 34px;
        background: radial-gradient(circle at 30% 30%, #4caf50 0%, var(--shell) 55%, var(--shell-dark) 100%);
        border: 2px solid #173d1f;
        border-radius: 50% 50% 45% 45%;
      }

      .head {
        position: absolute;
        right: 0;
        top: 13px;
        width: 20px;
        height: 16px;
        background: #66bb6a;
        border: 2px solid #173d1f;
        border-radius: 50%;
      }

      .leg {
        position: absolute;
        width: 13px;
        height: 8px;
        background: #66bb6a;
        border: 2px solid #173d1f;
        border-radius: 8px;
      }

      .leg.l1 { left: 16px; top: 34px; }
      .leg.l2 { left: 38px; top: 34px; }
      .leg.l3 { left: 16px; top: 0; }
      .leg.l4 { left: 38px; top: 0; }

      .tail {
        position: absolute;
        left: 2px;
        top: 18px;
        width: 10px;
        height: 10px;
        background: #66bb6a;
        border: 2px solid #173d1f;
        border-radius: 2px 8px 8px 2px;
      }

      .cta {
        position: absolute;
        left: 50%;
        bottom: 26px;
        transform: translateX(-50%);
        font-size: clamp(14px, 1.6vw, 22px);
        padding: 10px 18px;
        border: 2px solid #13383a;
        border-radius: 999px;
        background: #fff9e8;
        box-shadow: 0 6px 0 #d9c79e;
      }

      .hint {
        position: absolute;
        right: 12px;
        bottom: 10px;
        opacity: 0.65;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="scene">
      <div class="title">SuperTurtle writes the message</div>
      <canvas id="trail"></canvas>

      <div id="turtle" class="turtle" aria-hidden="true">
        <div class="tail"></div>
        <div class="shell"></div>
        <div class="head"></div>
        <div class="leg l1"></div>
        <div class="leg l2"></div>
        <div class="leg l3"></div>
        <div class="leg l4"></div>
      </div>

      <div class="cta">Vote for SuperTurtle on Product Hunt</div>
      <div class="hint">HTML5 canvas animation</div>
    </div>

    <script>
      const canvas = document.getElementById("trail");
      const ctx = canvas.getContext("2d");
      const turtle = document.getElementById("turtle");

      const phrase = "VOTE FOR SUPERTURTLE ON PRODUCT HUNT";
      const durationMs = 12000;
      let width = 0;
      let height = 0;
      let startTime = 0;

      function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        const dpr = window.devicePixelRatio || 1;
        canvas.width = Math.floor(width * dpr);
        canvas.height = Math.floor(height * dpr);
        canvas.style.width = `${width}px`;
        canvas.style.height = `${height}px`;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }

      function clamp(v, min, max) {
        return Math.max(min, Math.min(max, v));
      }

      function pathPoint(t) {
        const padX = Math.max(50, width * 0.06);
        const x = padX + t * (width - padX * 2);
        const y =
          height * 0.62 -
          Math.sin(t * Math.PI * 3.5) * (height * 0.085) -
          t * (height * 0.16);
        return { x, y };
      }

      function pathTangent(t) {
        const dt = 0.002;
        const p1 = pathPoint(clamp(t - dt, 0, 1));
        const p2 = pathPoint(clamp(t + dt, 0, 1));
        return Math.atan2(p2.y - p1.y, p2.x - p1.x);
      }

      function drawGuidePath() {
        ctx.save();
        ctx.strokeStyle = "rgba(18, 54, 58, 0.12)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        for (let i = 0; i <= 180; i++) {
          const t = i / 180;
          const p = pathPoint(t);
          if (i === 0) ctx.moveTo(p.x, p.y);
          else ctx.lineTo(p.x, p.y);
        }
        ctx.stroke();
        ctx.restore();
      }

      function drawWrittenLetters(progress) {
        const total = phrase.length;
        const reveal = Math.floor(progress * total);

        ctx.save();
        ctx.font = "700 clamp(16px, 2.3vw, 34px) Georgia, serif";
        ctx.fillStyle = "#1e7f5b";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";

        for (let i = 0; i < reveal; i++) {
          const ch = phrase[i];
          const t = (i + 0.7) / total;
          const p = pathPoint(t);
          const angle = pathTangent(t);

          ctx.save();
          ctx.translate(p.x, p.y);
          ctx.rotate(angle);
          ctx.fillText(ch, 0, 0);
          ctx.restore();
        }

        ctx.restore();
      }

      function placeTurtle(progress) {
        const p = pathPoint(progress);
        const angle = pathTangent(progress) * (180 / Math.PI);
        turtle.style.transform = `translate(${p.x - 38}px, ${p.y - 23}px) rotate(${angle}deg)`;
      }

      function drawSpark(progress) {
        const p = pathPoint(progress);
        ctx.save();
        ctx.fillStyle = "#ff6b35";
        for (let i = 0; i < 4; i++) {
          const a = (Math.PI / 2) * i + progress * 8;
          const r = 8 + i * 2;
          ctx.beginPath();
          ctx.arc(p.x + Math.cos(a) * r, p.y + Math.sin(a) * r, 1.8, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }

      function frame(ts) {
        if (!startTime) startTime = ts;
        const elapsed = ts - startTime;
        const progress = clamp((elapsed % durationMs) / durationMs, 0, 1);

        ctx.clearRect(0, 0, width, height);
        drawGuidePath();
        drawWrittenLetters(progress);
        drawSpark(progress);
        placeTurtle(progress);

        requestAnimationFrame(frame);
      }

      window.addEventListener("resize", resize);
      resize();
      requestAnimationFrame(frame);
    </script>
  </body>
</html>
